<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><title>Marcela Vovo | Gestion</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'><link href='https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@700&display=swap' rel='stylesheet'><style>body { font-family: 'Lato', sans-serif; background-color: #fdfbfb; } h4, h5, .navbar-brand { font-family: 'Playfair Display', serif; } .navbar-custom { background-color: #8e2144; border-bottom: 3px solid #6d1934; } .navbar-brand { font-size: 1.6rem; letter-spacing: 1px; } .card { border: none; border-radius: 15px; } .table thead { font-family: 'Playfair Display', serif; background-color: #f8f9fa; } .btn-search { background-color: #d4a373; color: white; border: none; font-weight: bold; }</style></head><body><nav class='navbar navbar-dark navbar-custom mb-4 shadow-sm'><div class='container'><a class='navbar-brand' href='/'>🍰 MARCELA VOVO</a><form class='d-flex' method='GET' action='/'><input class='form-control me-2 border-0 shadow-sm' type='search' name='buscar' placeholder='¿Que delicia buscas?'><button class='btn btn-search shadow-sm' type='submit'>Buscar</button></form></div></nav><div class='container'><div class='card shadow-sm'><div class='card-body p-4 text-center'><h4 class='mb-4' style='color: #5a1228;'>Catalogo de Reposteria</h4><table class='table table-hover align-middle'><thead class='text-dark'><tr><th>Producto</th><th>Categoria</th><th>Stock</th><th class='text-end'>Precio</th></tr></thead><tbody>{% for p in productos %}<tr><td class='text-start'><strong>{{ p.nombre }}</strong><br><small class='text-muted small'>{{ p.descripcion }}</small></td><td><span class='badge rounded-pill bg-light text-dark border'>{{ p.categoria }}</span></td><td>{{ p.stock }} uds</td><td class='text-end fw-bold' style='color: #8e2144;'>${{ p.precio }}</td></tr>{% empty %}<tr><td colspan='4' class='py-5 text-muted'>No hay resultados disponibles.</td></tr>{% endfor %}</tbody></table></div></div></div></body></html>
